<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Merci - EC(H)OME ENERGIES</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --brand-cyan: #40C4B4; --dark: #1A1A1B; }
        body { font-family: 'Inter', sans-serif; background: #F8FAFA; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .card { background: white; padding: 60px; border-radius: 40px; text-align: center; box-shadow: 0 40px 100px rgba(0,0,0,0.1); max-width: 550px; border: 1px solid #eee; }
        .logo { max-width: 180px; margin-bottom: 40px; }
        .check-icon { width: 80px; height: 80px; background: var(--brand-cyan); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 40px; margin: 0 auto 30px; box-shadow: 0 10px 20px rgba(64, 196, 180, 0.3); }
        h1 { color: var(--dark); font-weight: 900; font-size: 2.5rem; margin: 0; line-height: 1.2; }
        p { color: #666; font-size: 1.1rem; line-height: 1.6; margin: 20px 0 40px; }
        
        .reward-info { background: var(--dark); color: white; padding: 25px; border-radius: 20px; margin-bottom: 40px; }
        .reward-info span { font-size: 0.9rem; opacity: 0.8; text-transform: uppercase; letter-spacing: 1px; }
        .reward-info strong { display: block; color: var(--brand-cyan); font-size: 1.6rem; margin-top: 5px; }
        
        .btn-group { display: flex; flex-direction: column; gap: 15px; }
        .btn { padding: 18px 30px; text-decoration: none; border-radius: 12px; font-weight: 700; transition: 0.3s; text-align: center; }
        .btn-primary { background: var(--brand-cyan); color: white; }
        .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(64, 196, 180, 0.4); }
        .btn-secondary { background: transparent; color: var(--dark); border: 2px solid #eee; }
        .btn-secondary:hover { background: #f9f9f9; }

        @media (min-width: 480px) { .btn-group { flex-direction: row; justify-content: center; } }
    </style>
</head>
<body>
    <div class="card">
        <img src="Echome-Energies-fond-blanc.jpg" alt="Logo EC(H)OME" class="logo">
        <div class="check-icon">✓</div>
        <h1>C'est envoyé !</h1>
        <p>Merci pour votre recommandation. Notre équipe va étudier le projet et prendra contact avec vous ou votre proche sous 48h ouvrées.</p>
        
        <div class="reward-info">
            <span>Rappel de l'avantage parrainage</span>
            <strong>150€ ou 250€ par dossier</strong>
            <small style="font-size: 0.8rem; opacity: 0.6;">Selon la puissance installée finale</small>
        </div>

        <div class="btn-group">
            <a href="index.html" class="btn btn-primary">Parrainer un autre proche</a>
            <a href="https://echome-energies.fr" class="btn btn-secondary">Retour au site</a>
        </div>
    </div>
</body>
</html>
